<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enter Your Details</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <h1>💖 Friendship Details 💖</h1>

    <input type="text" id="yourName" placeholder="Enter Your Name"><br><br>

    <input type="text" id="friendName" placeholder="Enter Friend's Name"><br><br>

    <input type="number" id="yourAge" placeholder="Enter Your Age"><br><br>

    <input type="number" id="friendAge" placeholder="Enter Friend's Age"><br><br>

    <select id="gender">
        <option>Select Gender</option>
        <option>Male</option>
        <option>Female</option>
        <option>Other</option>
    </select>

    <br><br>

    <button onclick="nextpage()">Continue</button>

</div>

<script src="js/details.js"></script>

</body>
</html>
